<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NebulaShift — App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="app-body">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-section">
        <h2>Rooms</h2>
        <ul id="roomsList" class="list"></ul>
        <button id="newRoomBtn" class="secondary-btn">+ New Room</button>
      </div>

      <div class="sidebar-section">
        <h2>Friends</h2>
        <ul id="friendsList" class="list"></ul>
        <button id="addFriendBtn" class="secondary-btn">+ Add Friend</button>
      </div>

      <div class="sidebar-section">
        <h2>DMs</h2>
        <ul id="dmsList" class="list"></ul>
      </div>

      <div class="sidebar-footer">
        <span id="currentUser"></span>
        <button id="logoutBtn" class="secondary-btn small">Logout</button>
      </div>
    </aside>

    <main class="chat-main">
      <header class="chat-header">
        <h2 id="chatTitle">Select a room or DM</h2>
      </header>

      <section id="messages" class="messages"></section>

      <footer class="chat-input-bar">
        <input id="messageInput" class="input" placeholder="Type a message..." />
        <button id="sendBtn" class="primary-btn">Send</button>
      </footer>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
