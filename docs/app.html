<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NebulaShift</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="sidebar" class="sidebar">
  <div class="sidebar-section">
    <div class="sidebar-title">Friends</div>
    <div id="friendsList"></div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-title">DMs</div>
    <div id="dmList"></div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-title">Groups</div>
    <div id="roomList"></div>
  </div>

  <div class="user-panel">
    <img id="userPfp" class="user-pfp">
    <div id="userName" class="user-name"></div>
  </div>
</div>

<button id="toggleSidebar" class="sidebar-toggle">☰</button>

<div id="chatArea" class="chat-area">
  <div id="messages" class="messages"></div>

  <div class="input-bar">
    <input id="msgInput" placeholder="Message…">
    <button id="sendBtn">Send</button>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/ws.js"></script>
<script src="js/chat.js"></script>
<script src="js/rooms.js"></script>
<script src="js/dms.js"></script>
<script src="js/friends.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
