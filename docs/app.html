<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>NebulaShift</title>

  <!-- Updated CSS with cache‑buster -->
  <link rel="stylesheet" href="css/style.css?v=40">
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="sidebar-title">Navigation</div>

  <div class="sidebar-section">
    <div id="friendsBtn">Friends</div>
    <div id="dmsBtn">DMs</div>
    <div id="groupsBtn">Groups</div>
  </div>

  <div class="user-panel">
    <div class="user-pfp"></div>
    <div class="user-name" id="usernameDisplay">User</div>
  </div>
</div>

<button class="sidebar-toggle" id="toggleSidebar">☰</button>

<div class="chat-area">

  <!-- ⭐ CLEAN FRIENDS PANEL (NO DEBUG, NO TEST_USER) ⭐ -->
  <div id="friendsPanel" class="panel hidden">
    <h2>Friends</h2>

    <div class="add-box">
      <input id="addFriendInput" placeholder="Add friend by username...">
      <button id="addFriendBtn">Add</button>
    </div>

    <h3>Pending Requests</h3>
    <div id="pendingList"></div>

    <h3>Your Friends</h3>
    <div id="friendsList"></div>
  </div>

  <!-- DM PANEL -->
  <div id="dmPanel" class="panel hidden">
    <h2>Direct Messages</h2>
    <div id="dmList"></div>
  </div>

  <!-- GROUPS PANEL -->
  <div id="groupsPanel" class="panel hidden">
    <h2>Groups</h2>
    <div class="add-box">
      <input id="createGroupInput" placeholder="Group name...">
      <button id="createGroupBtn">Create</button>
    </div>
    <div id="groupsList"></div>
  </div>

  <!-- MESSAGES -->
  <div class="messages" id="messages"></div>

  <!-- INPUT -->
  <div class="input-bar">
    <input id="msgInput" placeholder="Message...">
    <button id="sendBtn">Send</button>
  </div>

</div>

<!-- ⭐ ALL REQUIRED JS FILES IN CORRECT ORDER ⭐ -->
<script src="js/ws.js?v=10"></script>
<script src="js/ui.js?v=10"></script>
<script src="js/friends.js?v=51"></script>
<script src="js/dms.js?v=10"></script>
<script src="js/rooms.js?v=10"></script>
<script src="js/app.js?v=10"></script>

</body>
</html>
