<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NebulaShift — Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <div class="auth-container">
    <h1 class="logo">NebulaShift</h1>

    <div class="tabs">
      <button id="loginTab" class="tab active">Login</button>
      <button id="signupTab" class="tab">Sign Up</button>
    </div>

    <div id="loginForm">
      <input id="loginUsername" class="input" placeholder="Username" />
      <input id="loginPassword" class="input" type="password" placeholder="Password" />
      <div id="loginError" class="error"></div>
      <button id="loginBtn" class="primary-btn">Login</button>
    </div>

    <div id="signupForm" class="hidden">
      <input id="signupUsername" class="input" placeholder="Username" />
      <input id="signupPassword" class="input" type="password" placeholder="Password" />
      <div id="signupError" class="error"></div>
      <button id="signupBtn" class="primary-btn">Create Account</button>
    </div>
  </div>

  <script type="module" src="auth.js"></script>
</body>
</html>
