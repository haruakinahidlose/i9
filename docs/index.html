<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NebulaShift — Login</title>

    <!-- Optional: your CSS folder -->
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            background: #0d0d12;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: #1a1a22;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: none;
            background: #2a2a33;
            color: white;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #6a4df5;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .switchBtn {
            background: #444;
            margin-top: 10px;
        }
        .error {
            margin-top: 10px;
            color: #ff6b6b;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- LOGIN BOX -->
    <div id="loginBox" class="box">
        <h2>Login</h2>

        <input id="loginUsername" placeholder="Username">
        <input id="loginPassword" type="password" placeholder="Password">

        <div id="loginError" class="error"></div>

        <button id="loginBtn">Login</button>
        <button id="goSignup" class="switchBtn">Create Account</button>
    </div>

    <!-- SIGNUP BOX (HIDDEN BY DEFAULT) -->
    <div id="signupBox" class="box" style="display:none;">
        <h2>Sign Up</h2>

        <input id="signupUsername" placeholder="Username">
        <input id="signupPassword" type="password" placeholder="Password">
        <input id="signupPfp" placeholder="Profile Picture URL (optional)">

        <div id="signupError" class="error"></div>

        <button id="signupBtn">Create Account</button>
        <button id="goLogin" class="switchBtn">Back to Login</button>
    </div>

    <!-- IMPORTANT: auth.js is inside docs/js/ -->
    <script src="js/auth.js"></script>
</body>
</html>
